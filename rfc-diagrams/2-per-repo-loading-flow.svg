  <text x="399.787" y="420.341" text-anchor="middle" font-size="var(--fs-m)" font-weight="500" fill="var(--_text)"><tspan x="399.787" dy="-4.2">docset-v2.yml</tspan><tspan x="399.787" dy="18.2">present?</tspan></text>
</g>
