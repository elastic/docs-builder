  <text x="476.38499999999993" y="212" text-anchor="middle" font-size="var(--fs-m)" font-weight="500" fill="var(--_text)"><tspan x="476.38499999999993" dy="-4.2">navigation-v2.yml URI resolved</tspan><tspan x="476.38499999999993" dy="18.2">to repo checkout on disk</tspan></text>
</g>
