name: Release

on:
  workflow_dispatch: 
    
permissions:
  contents: read
  packages: write
    
concurrency:
  group: release-drafter

jobs:
  
  release-drafter:
    outputs:
      tag_name: ${{ steps.release-drafter.outputs.tag_name }}
    permissions:
      contents: write
      pull-requests: read
    runs-on: ubuntu-latest
    steps:
      - name: Verify branch
        run: |
          if [[ "${{ github.ref }}" != refs/heads/main ]]; then
            echo "This workflow is only allowed to run on the main branch."
            exit 1
          fi
      - uses: release-drafter/release-drafter@c2e2804cc59f45f57076a99af580d0fedb697927 # v7.3.0
        id: release-drafter
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          commitish: ${{ github.sha }}
      - name: Create tag
        uses: actions/github-script@v9
        with:
          script: |
            github.rest.git.createRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: 'refs/tags/${{ steps.release-drafter.outputs.tag_name }}',
              sha: context.sha
            })
  
  containers:
    needs: 
      - release-drafter
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      # Required for `actions/attest-build-provenance`
      id-token: write
      attestations: write
    outputs:
      full-version: ${{ steps.bootstrap.outputs.full-version }}
      major-version: ${{ steps.bootstrap.outputs.major-version }}

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.release-drafter.outputs.tag_name }}
      - name: Bootstrap Action Workspace
        id: bootstrap
        uses: ./.github/actions/bootstrap

      - name: Restore npm dependencies
        working-directory: src/Elastic.Documentation.Site
        run: npm ci

      - name: Check shai-hulud supply-chain hashes
        uses: ./.github/actions/check-shai-hulud
        with:
          path: src/Elastic.Documentation.Site

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish Containers
        run: ./build.sh publishcontainers

      # Resolve the manifest digest of each pushed image so we can
      # mint a signed attestation against the immutable digest. The
      # release version tag (e.g., :v1.4.0) is the canonical reference
      # but we attest against the digest because tags can be moved.
      # Consumers verify with:
      #   gh attestation verify oci://ghcr.io/elastic/docs-builder@<digest> \
      #     -R elastic/docs-builder
      - name: Resolve pushed image digests
        id: digests
        env:
          TAG_NAME: ${{ needs.release-drafter.outputs.tag_name }}
        # language=bash
        run: |
          set -euo pipefail
          for image in docs-builder docs-builder-mcp docs-builder-api; do
            ref="ghcr.io/elastic/${image}:${TAG_NAME}"
            digest=$(docker buildx imagetools inspect "$ref" 2>/dev/null \
              | awk '/^Digest:/ {print $2; exit}')
            if [ -z "$digest" ]; then
              echo "::error::Could not resolve manifest digest for ${ref}"
              exit 1
            fi
            echo "${image}=${digest}" >> "$GITHUB_OUTPUT"
            echo "Resolved ${ref} -> ${digest}"
          done

      - name: Attest docs-builder image
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ghcr.io/elastic/docs-builder
          subject-digest: ${{ steps.digests.outputs.docs-builder }}
          push-to-registry: true

      - name: Attest docs-builder-mcp image
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ghcr.io/elastic/docs-builder-mcp
          subject-digest: ${{ steps.digests.outputs.docs-builder-mcp }}
          push-to-registry: true

      - name: Attest docs-builder-api image
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ghcr.io/elastic/docs-builder-api
          subject-digest: ${{ steps.digests.outputs.docs-builder-api }}
          push-to-registry: true
        
  build-link-index-lambda:
    needs: 
      - release-drafter
    uses: ./.github/workflows/build-link-index-updater-lambda.yml
    with:
      ref: ${{ needs.release-drafter.outputs.tag_name }}

  build-changelog-scrubber-lambda:
    needs:
      - release-drafter
    uses: ./.github/workflows/build-changelog-scrubber-lambda.yml
    with:
      ref: ${{ needs.release-drafter.outputs.tag_name }}

  deploy-link-index-updater-lambda-prod:
    environment: 
      name: link-index-updater-prod
    runs-on: ubuntu-latest
    needs:
      - build-link-index-lambda
      - release-drafter
    permissions:
      contents: write
      id-token: write
    env: 
      ZIP_FILE: link-index-updater-lambda.zip
    steps:

      - name: Download bootstrap binary
        uses: actions/download-artifact@v8
        with: 
          name: link-index-updater-lambda-binary

      - name: Create zip
        run: |
          zip -j "${ZIP_FILE}" ./bootstrap

      - uses: aws-actions/configure-aws-credentials@d979d5b3a71173a29b74b5b88418bfda9437d885 # v6.1.1
        with:
          role-to-assume: arn:aws:iam::197730964718:role/elastic-docs-v3-link-index-updater-deployer
          aws-region: us-east-2
      
      - name: Upload Lambda function
        run: |
          aws lambda update-function-code \
            --function-name elastic-docs-v3-link-index-updater \
            --zip-file "fileb://${ZIP_FILE}"
      
      - name: Attach Distribution to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ needs.release-drafter.outputs.tag_name }}
          REPO: ${{ github.repository }}
        run: gh release upload --repo "$REPO" "$TAG_NAME" "${ZIP_FILE}"

  deploy-changelog-scrubber-lambda-prod:
    environment:
      name: changelog-scrubber-prod
    runs-on: ubuntu-latest
    needs:
      - build-changelog-scrubber-lambda
      - release-drafter
    permissions:
      contents: write
      id-token: write
    env:
      ZIP_FILE: changelog-scrubber-lambda.zip
    steps:

      - name: Download bootstrap binary
        uses: actions/download-artifact@v8
        with:
          name: changelog-scrubber-lambda-binary

      - name: Create zip
        run: |
          zip -j "${ZIP_FILE}" ./bootstrap

      - uses: aws-actions/configure-aws-credentials@d979d5b3a71173a29b74b5b88418bfda9437d885 # v6.1.1
        with:
          role-to-assume: arn:aws:iam::197730964718:role/elastic-docs-v3-changelog-scrubber-deployer
          aws-region: us-east-1

      - name: Upload Lambda function
        run: |
          aws lambda update-function-code \
            --function-name elastic-docs-v3-changelog-scrubber \
            --zip-file "fileb://${ZIP_FILE}"

      - name: Attach Distribution to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ needs.release-drafter.outputs.tag_name }}
          REPO: ${{ github.repository }}
        run: gh release upload --repo "$REPO" "$TAG_NAME" "${ZIP_FILE}"

  release:
    needs: 
      - release-drafter
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, windows-latest, macos-latest, macos-latest-large ]
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
      attestations: write
      id-token: write
    outputs:
      full-version: ${{ steps.bootstrap.outputs.full-version }}
      major-version: ${{ steps.bootstrap.outputs.major-version }}

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.release-drafter.outputs.tag_name }}
      - name: 'Windows only, set TEMP to the same drive'
        if: ${{ matrix.os == 'windows-latest' }}
        #  temporary waiting for https://github.com/parcel-bundler/parcel/pull/10095 to fix
        run: |
          mkdir "D:\\Temp"
          echo "TEMP=D:\\Temp" >> $env:GITHUB_ENV

      - name: Bootstrap Action Workspace
        id: bootstrap
        uses: ./.github/actions/bootstrap

      - name: Publish Binaries
        run: ./build.sh publishzip
        shell: bash
        
      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: |
            .artifacts/publish/docs-builder/release/*.zip

      - name: Attach Distribution to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ needs.release-drafter.outputs.tag_name }}
        run: |
          gh release upload "$TAG_NAME" .artifacts/publish/docs-builder/release/*.zip
        shell: bash

  publish-release:
    needs:
      - release
      - containers
      - release-drafter
      - deploy-link-index-updater-lambda-prod
      - deploy-changelog-scrubber-lambda-prod
    runs-on: ubuntu-latest
    permissions: 
      contents: write
    steps:
      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ needs.release-drafter.outputs.tag_name }}
          REPO: ${{ github.repository }}
        run: |
          gh release edit "$TAG_NAME" --draft=false --latest --repo "$REPO"
