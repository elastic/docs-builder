name: release-drafter

on:
  workflow_dispatch: ~
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  update-release-draft:
    concurrency:
      group: release-drafter
    permissions:
      contents: write
      pull-requests: read
    runs-on: ubuntu-latest
    steps:
      - uses: release-drafter/release-drafter@c2e2804cc59f45f57076a99af580d0fedb697927 # v7.3.0
        env:
          GITHUB_TOKEN: ${{ github.token }}
