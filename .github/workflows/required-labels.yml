name: required-labels

on:
  pull_request_target:
    types:
      - opened
      - labeled
      - unlabeled
      - synchronize

permissions:
  contents: read

jobs:
  check-labels:
    permissions:
      contents: read
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3
        with:
          persist-credentials: false
      - name: Wait for PR to be ready (if just opened)
        if: github.event_name == 'pull_request_target' && github.event.action == 'opened'
        run: sleep 30
      - id: get-labels
        run: |
          labels=$(yq '[.categories[].labels] + .exclude-labels | flatten | unique | sort | @tsv' .github/release-drafter.yml | tr '\t' ',')
          echo "labels=$labels" >> "${GITHUB_OUTPUT}"
      - id: check-labels
        uses: mheap/github-action-required-labels@23e10fde7e062233401931a0eece796cd9bf3177 # v5.6.0
        with:
          mode: exactly
          count: 1
          use_regex: false
          add_comment: true
          labels: ${{ steps.get-labels.outputs.labels }}
