name: ci

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages

jobs:
  validate-assembler:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3
        with:
          persist-credentials: false

      - name: Bootstrap Action Workspace
        id: bootstrap
        uses: ./.github/actions/bootstrap

      - name: Validate Navigation
        run: dotnet run --project src/tooling/docs-builder -c release -- assembler navigation validate

      - name: Validate Content Sources
        run: dotnet run --project src/tooling/docs-builder -c release -- assembler content-source validate

  build-link-index-updater-lambda:
    uses: ./.github/workflows/build-link-index-updater-lambda.yml

  synthetics:
    runs-on: ubuntu-latest
    env:
      MSBuildNoWarn: IDE0032
    steps:
      - uses: actions/checkout@v6.0.3
        with:
          persist-credentials: false
        
      - name: Bootstrap Action Workspace
        id: bootstrap
        uses: ./.github/actions/bootstrap
          
      - name: Install dependencies
        working-directory: src/Elastic.Documentation.Site
        run: npm ci
        
      - name: Run assembler
        run: |
          mkdir ../assembler-workspace
          cd ../assembler-workspace
          dotnet run --project ../docs-builder/src/tooling/docs-builder -- assembler config init --local 
          dotnet run --project ../docs-builder/src/tooling/docs-builder -- assembler clone -c local --skip-private-repositories
          dotnet run --project ../docs-builder/src/tooling/docs-builder -- assembler build -c local --skip-private-repositories
          dotnet run --project ../docs-builder/src/tooling/docs-builder -- assembler serve &
        
      - name: Wait for docs
        working-directory: src/Elastic.Documentation.Site
        run: npx wait-on http-get://localhost:4000/docs
          
      - name: Run synthetics
        working-directory: src/Elastic.Documentation.Site
        run: npm run synthetics:test

  npm:
    runs-on: ubuntu-latest
    defaults: 
      run: 
        working-directory: src/Elastic.Documentation.Site
    steps:
      - uses: actions/checkout@v6.0.3
        with:
          persist-credentials: false

      - uses: actions/setup-node@v6
        with:
          cache: npm
          cache-dependency-path: src/Elastic.Documentation.Site/package-lock.json
          node-version-file: .nvmrc
      
      - name: Install dependencies
        run: npm ci

      - name: Check shai-hulud attack
        uses: ./.github/actions/check-shai-hulud
        with:
          path: src/Elastic.Documentation.Site

      - name: Lint
        run: npm run lint
      
      - name: Format
        run: npm run fmt:check
      
      - name: Compile
        run: npm run compile:check
        
      - name: Build
        run: npm run build
        
      - name: Test
        run: npm run test
      

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3
        with:
          persist-credentials: false

      - name: Bootstrap Action Workspace
        id: bootstrap
        uses: ./.github/actions/bootstrap

      - name: Lint
        run: dotnet run --project build -c release -- lint

  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
         - ubuntu-latest
         - macos-latest
         - windows-latest
    steps:          
      - uses: actions/checkout@v6.0.3
        with:
          persist-credentials: false
      - name: 'Windows only, set TEMP to the same drive'
        if: ${{ matrix.os == 'windows-latest' }}
        #  temporary waiting for https://github.com/parcel-bundler/parcel/pull/10095 to fix
        run: |
          mkdir "D:\\Temp"
          echo "TEMP=D:\\Temp" >> $env:GITHUB_ENV

      - name: Bootstrap Action Workspace
        id: bootstrap
        uses: ./.github/actions/bootstrap

      - name: Install Aspire workload
        run: dotnet workload install aspire

      - name: Compile
        run: dotnet run --project build -c release -- compile

      - name: Check CLI schema is up to date
        if: ${{ matrix.os == 'ubuntu-latest' }}
        run: |
          dotnet run --project src/tooling/docs-builder -c release --no-build -- __schema > docs/cli-schema.json.tmp
          diff <(jq 'del(.version)' docs/cli-schema.json) <(jq 'del(.version)' docs/cli-schema.json.tmp) || (echo "docs/cli-schema.json is out of date — run: dotnet run --project src/tooling/docs-builder -- __schema > docs/cli-schema.json" && exit 1)
          rm docs/cli-schema.json.tmp

      - name: Test
        run: dotnet run --project build -c release -- unit-test

      - name: Publish AOT
        if: ${{ github.event_name == 'push' && matrix.os != 'ubuntu-latest' }} # publish containers already validates AOT build
        run: dotnet run --project build -c release -- publishbinaries

      - name: Publish Containers
        if: ${{ github.event_name == 'push' && matrix.os == 'ubuntu-latest' }}
        env:
          DOCKER_NO_PUBLISH: true
        run: dotnet run --project build -c release -- publishcontainers

      - name: Run Container
        if: ${{ github.event_name == 'push' && matrix.os == 'ubuntu-latest' }}
        run: dotnet run --project build -c release -- runlocalcontainer
        

  integration:
    # TODO temporarily disabled: credentials now actually reach the tests (Parameters:-prefixed
    # secrets) which surfaced failures — re-enabling is tracked in a dedicated PR.
    if: false
    runs-on: docs-builder-latest-16
    environment: integration-tests
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6.0.3
        with:
          persist-credentials: false

      - name: Bootstrap Action Workspace
        id: bootstrap
        uses: ./.github/actions/bootstrap

      - name: Install Aspire workload
        run: dotnet workload install aspire

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@254c19bd240aabef8777f48595e9d2d7b972184b # v6.2.1
        with:
          role-to-assume: arn:aws:iam::197730964718:role/elastic-docs-v3-integration-tests
          aws-region: us-east-1

      - name: Fetch ES credentials
        run: |
          ES_URL=$(aws ssm get-parameter --name /elastic-docs-v3/prod/docs-elasticsearch-github-actions-readonly-url --with-decryption --query Parameter.Value --output text)
          ES_KEY=$(aws ssm get-parameter --name /elastic-docs-v3/prod/docs-elasticsearch-github-actions-readonly-api-key --with-decryption --query Parameter.Value --output text)
          echo "::add-mask::$ES_URL"
          echo "::add-mask::$ES_KEY"
          dotnet user-secrets set "Parameters:ElasticsearchUrl" "$ES_URL" --project aspire
          dotnet user-secrets set "Parameters:ElasticsearchApiKey" "$ES_KEY" --project aspire

      - name: Integration Tests
        env:
          ENVIRONMENT: prod
        run: dotnet run --project build -c release -- integrate
